name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-experts-front-core
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 100.87.139.83 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy script on server
        run: |
          ssh -o BatchMode=yes kennyp2233@100.87.139.83 \
            'powershell -ExecutionPolicy Bypass -File C:\deploy\deploy-experts-front-core.ps1'
